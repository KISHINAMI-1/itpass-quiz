<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ITパスポート クイズ</title>
  <style>
    body { font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif; margin: 16px; line-height: 1.5; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; max-width: 900px; margin: 0 auto; }
    .meta { color:#555; font-size: 14px; display:flex; gap:12px; flex-wrap:wrap; }
    .q { font-size: 18px; margin: 12px 0 8px; }
    button { width: 100%; padding: 12px 10px; margin: 6px 0; border-radius: 10px; border: 1px solid #ccc; background: #fff; font-size: 16px; }
    button:active { transform: scale(0.99); }
    .result { margin-top: 10px; font-weight: 700; }
    .row { display:flex; gap:10px; flex-wrap:wrap; margin-top: 12px; }
    .small { width:auto; padding:10px 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="meta">
      <div>分野: <span id="field">-</span></div>
      <div>ID: <span id="qid">-</span></div>
      <div>正答数: <span id="ok">0</span>/<span id="total">0</span></div>
    </div>

    <div id="categorySelect" class="row">
      <button class="small" id="btnStrategy">ストラテジ系 (0)</button>
      <button class="small" id="btnManagement">マネジメント系 (0)</button>
      <button class="small" id="btnTechnology">テクノロジ系 (0)</button>
      <button class="small" id="btnAll">全部 (0)</button>
    </div>

    <div class="q" id="question">CSVを読み込み中…</div>

    <div id="choices"></div>

    <div class="result" id="result"></div>

    <div class="row">
      <button class="small" id="nextBtn">次の問題</button>
      <button class="small" id="reloadBtn">CSV再読み込み</button>
    </div>
  </div>

<script>
const CSV_PATH = './ITpassport.csv';

let questions = [];
let deck = [];
let deckIndex = 0;

let current = null;
let locked = false;
let correctCount = 0;
let totalCount = 0;
let filteredQuestions = [];
let selectedCategory = '全部';

function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const next = text[i + 1];

    if (c === '"') {
      if (inQuotes && next === '"') { cell += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if (c === ',' && !inQuotes) {
      row.push(cell); cell = '';
    } else if ((c === '\n' || c === '\r') && !inQuotes) {
      if (c === '\r' && next === '\n') i++;
      row.push(cell); cell = '';
      if (row.some(v => v.trim() !== '')) rows.push(row);
      row = [];
    } else {
      cell += c;
    }
  }
  if (cell.length || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function normalizeHeader(h) {
  return (h || '').trim();
}

function setCategory(category) {
  selectedCategory = category;

  if (category === '全部') {
    filteredQuestions = [...questions];
  } else {
    filteredQuestions = questions.filter(q => q.field === category);
  }

  deck = shuffle([...filteredQuestions]);
  deckIndex = 0;

  if (filteredQuestions.length === 0) {
    document.getElementById('question').textContent = `「${category}」の問題がありません`;
    document.getElementById('choices').innerHTML = '';
    document.getElementById('result').textContent = '';
    document.getElementById('field').textContent = category;
    document.getElementById('qid').textContent = '-';
    return;
  }

  showNextQuestion();
}

async function loadQuestions() {
  document.getElementById('question').textContent = 'CSVを読み込み中…';
  document.getElementById('result').textContent = '';

  const res = await fetch(CSV_PATH, { cache: 'no-store' });
  if (!res.ok) throw new Error('CSVを取得できませんでした: ' + res.status);

  const text = await res.text();
  const rows = parseCSV(text);
  if (rows.length < 2) throw new Error('CSVにデータがありません');

  const header = rows[0].map(normalizeHeader);

  const idx = {
    id: header.indexOf('問題ID'),
    field: header.indexOf('分野'),
    q: header.indexOf('問題文'),
    img: header.indexOf('画像'),
    a1: header.indexOf('選択肢1'),
    a2: header.indexOf('選択肢2'),
    a3: header.indexOf('選択肢3'),
    a4: header.indexOf('選択肢4'),
    ans: header.indexOf('正解'),
    exp: header.indexOf('解説'),
    expImg: header.indexOf('解説画像')
  };

  // 必須列チェック（解説は任意）
  const required = ['id','field','q','a1','a2','a3','a4','ans'];
  for (const k of required) {
    if (idx[k] === -1) throw new Error(`CSVの列名「${k}」が見つかりません（ヘッダ名を確認）`);
  }

  questions = rows.slice(1).map(r => ({
    id: (r[idx.id] ?? '').trim(),
    field: (r[idx.field] ?? '').trim(),
    text: (r[idx.q] ?? '').trim(),
    image: idx.img === -1 ? "" : (r[idx.img] ?? '').trim(),  // ←追加
    choices: [
      (r[idx.a1] ?? '').trim(),
      (r[idx.a2] ?? '').trim(),
      (r[idx.a3] ?? '').trim(),
      (r[idx.a4] ?? '').trim(),
    ],
    answer: parseInt((r[idx.ans] ?? '').trim(), 10),
    explanation: idx.exp === -1 ? "" : ((r[idx.exp] ?? '').trim()),
    explanationImage: idx.expImg === -1 ? "" : (r[idx.expImg] ?? '').trim()
  })).filter(q =>
    q.text &&
    q.choices.every(c => c) &&
    Number.isInteger(q.answer) &&
    q.answer >= 1 && q.answer <= 4
  );

  if (questions.length === 0) throw new Error('有効な問題が0件です（空欄や正解の値を確認）');

  const strategyCount = questions.filter(q => q.field === 'ストラテジ系').length;
  const managementCount = questions.filter(q => q.field === 'マネジメント系').length;
  const technologyCount = questions.filter(q => q.field === 'テクノロジ系').length;

  document.getElementById('btnStrategy').textContent = `ストラテジ系 (${strategyCount})`;
  document.getElementById('btnManagement').textContent = `マネジメント系 (${managementCount})`;
  document.getElementById('btnTechnology').textContent = `テクノロジ系 (${technologyCount})`;
  document.getElementById('btnAll').textContent = `全部 (${questions.length})`;

  // 最初に自動で「全部」を選ぶ
  setCategory('全部');
}

function showNextQuestion() {
  locked = false;
  document.getElementById('result').textContent = '';

  // 1周したら次の周回（その周回内では重複なし）
  if (deckIndex >= deck.length) {
    deck = shuffle([...filteredQuestions]);
    deckIndex = 0;
    document.getElementById('result').textContent = `🔄 ${selectedCategory} を1周完了！次の周回に入ります`;
  }

  current = deck[deckIndex++];

  document.getElementById('field').textContent = current.field || '-';
  document.getElementById('qid').textContent = current.id || '-';
  document.getElementById('question').textContent = current.text;

// 🔽 ここで画像表示処理
let imgArea = document.getElementById('imageArea');
if (!imgArea) {
  imgArea = document.createElement('div');
  imgArea.id = 'imageArea';
  imgArea.style.margin = '10px 0';
  document.getElementById('question').after(imgArea);
}

imgArea.innerHTML = '';

if (current.image) {
  // 複数画像対応：; , | で区切れる
  const files = current.image
    .split(/[;,|；]/)
    .map(s => s.trim())
    .filter(Boolean);

  files.forEach((file) => {
    const imgUrl = `images/${file}`;

    const img = document.createElement('img');
    img.src = imgUrl;
    img.style.maxWidth = '100%';
    img.style.borderRadius = '8px';
    img.style.display = 'block';
    img.style.margin = '8px 0';

    const err = document.createElement('div');
    err.style.color = 'red';
    err.style.margin = '6px 0 10px';
    err.style.display = 'none';
    err.textContent = `⚠ 画像が見つかりません: ${imgUrl}`;

    img.onerror = () => {
      img.style.display = 'none';
      err.style.display = 'block';
      console.error('Image not found:', imgUrl);
    };

    imgArea.appendChild(img);
    imgArea.appendChild(err);
  });
}

  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';

  current.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.textContent = `${i + 1}. ${c}`;
    btn.onclick = () => judge(i + 1);
    choicesDiv.appendChild(btn);
  });
}

function judge(selected) {
  if (locked) return;
  locked = true;

  totalCount++;
  const ok = (selected === current.answer);
  if (ok) correctCount++;

  document.getElementById('ok').textContent = String(correctCount);
  document.getElementById('total').textContent = String(totalCount);

  const expText = current.explanation ? `📘 解説：${current.explanation}` : '📘 解説：（未入力）';

  // まずテキストだけ表示（画像はあとで追加）
  document.getElementById('result').innerHTML =
    ok
      ? `✅ 正解！<br><br>${expText}<div id="expImageArea"></div>`
      : `❌ 不正解（正解は ${current.answer}）<br><br>${expText}<div id="expImageArea"></div>`;

  // 解説画像エリア
  const expArea = document.getElementById('expImageArea');
  expArea.style.marginTop = '10px';

  // 解説画像（複数対応：; , |）
  if (current.explanationImage) {
    const files = current.explanationImage
      .split(/[;,|；]/)
      .map(s => s.trim())
      .filter(Boolean);

    files.forEach((file) => {
      const imgUrl = `images/${file}`;

      const img = document.createElement('img');
      img.src = imgUrl;
      img.style.maxWidth = '100%';
      img.style.borderRadius = '8px';
      img.style.display = 'block';
      img.style.margin = '8px 0';

      const err = document.createElement('div');
      err.style.color = 'red';
      err.style.margin = '6px 0 10px';
      err.style.display = 'none';
      err.textContent = `⚠ 解説画像が見つかりません: ${imgUrl}`;

      img.onerror = () => {
        img.style.display = 'none';
        err.style.display = 'block';
        console.error('Explanation image not found:', imgUrl);
      };

      expArea.appendChild(img);
      expArea.appendChild(err);
    });
  }
}

document.getElementById('nextBtn').addEventListener('click', showNextQuestion);
document.getElementById('reloadBtn').addEventListener('click', () => loadQuestions().catch(e => alert(e.message)));
document.getElementById('btnStrategy').addEventListener('click', () => setCategory('ストラテジ系'));
document.getElementById('btnManagement').addEventListener('click', () => setCategory('マネジメント系'));
document.getElementById('btnTechnology').addEventListener('click', () => setCategory('テクノロジ系'));
document.getElementById('btnAll').addEventListener('click', () => setCategory('全部'));

loadQuestions().catch(e => alert(e.message));
</script>
</body>
</html>
